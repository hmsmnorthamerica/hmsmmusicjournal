<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Journal - Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0f0ff', 100:'#e0e4ff', 200:'#c5caf5', 400:'#7b7ce0', 500:'#5556a8', 600:'#3a3a6e', 700:'#2d2d5e' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-brand-50 min-h-screen">
  <div id="root"></div>

  <script src="security-rules.js"></script>
  <script type="text/babel">
    const { useState, useEffect, createContext, useContext } = React;

    // ─── Auth Context ─────────────────────────────────────────────────────────────
    const AuthContext = createContext(null);

    function AuthProvider({ children }) {
      const [user, setUser] = useState(() => {
        const saved = localStorage.getItem('mj_auth_user');
        return saved ? JSON.parse(saved) : null;
      });

      const register = (userData) => {
        const users = JSON.parse(localStorage.getItem('mj_auth_users') || '[]');
        if (users.some(u => u.email === userData.email)) {
          return { success: false, error: 'Email already registered.' };
        }
        // Add instructorId for students (null = unassigned)
        // Add studentsList for instructors (empty array)
        const enriched = { ...userData };
        if (userData.role === 'student') {
          enriched.instructorId = null;
        }
        if (userData.role === 'instructor') {
          enriched.studentsList = [];
        }
        users.push(enriched);
        localStorage.setItem('mj_auth_users', JSON.stringify(users));
        return { success: true };
      };

      const login = (email, password) => {
        const users = JSON.parse(localStorage.getItem('mj_auth_users') || '[]');
        const found = users.find(u => u.email === email && u.password === password);
        if (!found) return { success: false, error: 'Invalid email or password.' };
        const loggedIn = { name: found.name, email: found.email, role: found.role, instructorId: found.instructorId || null, studentsList: found.studentsList || [] };
        setUser(loggedIn);
        localStorage.setItem('mj_auth_user', JSON.stringify(loggedIn));
        return { success: true, user: loggedIn };
      };

      const logout = () => {
        setUser(null);
        localStorage.removeItem('mj_auth_user');
      };

      // Assign a teacher to a student (admin action)
      const assignTeacher = (studentEmail, instructorEmail) => {
        const users = JSON.parse(localStorage.getItem('mj_auth_users') || '[]');
        const studentIdx = users.findIndex(u => u.email === studentEmail && u.role === 'student');
        const instructorIdx = users.findIndex(u => u.email === instructorEmail && u.role === 'instructor');
        if (studentIdx === -1 || instructorIdx === -1) return false;

        // Remove student from old instructor's list if previously assigned
        const oldInstructorId = users[studentIdx].instructorId;
        if (oldInstructorId) {
          const oldIdx = users.findIndex(u => u.email === oldInstructorId);
          if (oldIdx !== -1 && users[oldIdx].studentsList) {
            users[oldIdx].studentsList = users[oldIdx].studentsList.filter(e => e !== studentEmail);
          }
        }

        // Set instructorId on student
        users[studentIdx].instructorId = instructorEmail;

        // Add student to instructor's studentsList
        if (!users[instructorIdx].studentsList) users[instructorIdx].studentsList = [];
        if (!users[instructorIdx].studentsList.includes(studentEmail)) {
          users[instructorIdx].studentsList.push(studentEmail);
        }

        localStorage.setItem('mj_auth_users', JSON.stringify(users));
        return true;
      };

      // Unassign a teacher from a student
      const unassignTeacher = (studentEmail) => {
        const users = JSON.parse(localStorage.getItem('mj_auth_users') || '[]');
        const studentIdx = users.findIndex(u => u.email === studentEmail && u.role === 'student');
        if (studentIdx === -1) return false;

        const oldInstructorId = users[studentIdx].instructorId;
        if (oldInstructorId) {
          const oldIdx = users.findIndex(u => u.email === oldInstructorId);
          if (oldIdx !== -1 && users[oldIdx].studentsList) {
            users[oldIdx].studentsList = users[oldIdx].studentsList.filter(e => e !== studentEmail);
          }
        }
        users[studentIdx].instructorId = null;
        localStorage.setItem('mj_auth_users', JSON.stringify(users));
        return true;
      };

      // ─── Role-Based Balance Transactions ──────────────────────────────────────
      // Student: Read-only (cannot modify balances)
      // Instructor: Can update balances for assigned students only
      // Admin: Can update balances for any student

      const getBalance = (studentEmail) => {
        const balances = JSON.parse(localStorage.getItem('mj_balances') || '{}');
        return balances[studentEmail] || { stamps: 0, coins: 0 };
      };

      const updateBalance = (currentUser, studentEmail, type, amount) => {
        // Role Check: Students have 0 permission to write/update
        if (currentUser.role === 'student') {
          return { success: false, error: 'Students cannot modify balances.' };
        }

        // Role Check: Instructors can only update their assigned students
        if (currentUser.role === 'instructor') {
          const users = JSON.parse(localStorage.getItem('mj_auth_users') || '[]');
          const student = users.find(u => u.email === studentEmail && u.role === 'student');
          if (!student || student.instructorId !== currentUser.email) {
            return { success: false, error: 'You can only update balances for your assigned students.' };
          }
        }

        // Role Check: Admin can update any student (no restrictions)
        if (currentUser.role !== 'admin' && currentUser.role !== 'instructor') {
          return { success: false, error: 'Unauthorized role.' };
        }

        // Validate type
        if (type !== 'stamps' && type !== 'coins') {
          return { success: false, error: 'Invalid balance type. Use "stamps" or "coins".' };
        }

        // Perform the transaction
        const balances = JSON.parse(localStorage.getItem('mj_balances') || '{}');
        if (!balances[studentEmail]) {
          balances[studentEmail] = { stamps: 0, coins: 0 };
        }

        const newValue = balances[studentEmail][type] + amount;
        if (newValue < 0) {
          return { success: false, error: `Insufficient ${type}. Current: ${balances[studentEmail][type]}, attempted: ${amount}` };
        }

        balances[studentEmail][type] = newValue;
        localStorage.setItem('mj_balances', JSON.stringify(balances));

        // Log the transaction
        const txLog = JSON.parse(localStorage.getItem('mj_transactions') || '[]');
        txLog.push({
          date: new Date().toISOString(),
          performedBy: currentUser.email,
          performedByRole: currentUser.role,
          studentEmail,
          type,
          amount,
          newBalance: newValue
        });
        localStorage.setItem('mj_transactions', JSON.stringify(txLog));

        return { success: true, newBalance: balances[studentEmail] };
      };

      return (
        <AuthContext.Provider value={{ user, register, login, logout, assignTeacher, unassignTeacher, getBalance, updateBalance }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() {
      return useContext(AuthContext);
    }

    // ─── Simple Router ────────────────────────────────────────────────────────────
    function useRouter() {
      const [path, setPath] = useState(window.location.hash.slice(1) || '/');

      useEffect(() => {
        const onHash = () => setPath(window.location.hash.slice(1) || '/');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const navigate = (to) => { window.location.hash = to; };
      return { path, navigate };
    }

    // ─── Protected Route ──────────────────────────────────────────────────────────
    function ProtectedRoute({ children, allowedRoles, navigate }) {
      const { user } = useAuth();

      if (!user) {
        useEffect(() => { navigate('/login'); }, []);
        return (
          <div className="text-center py-20 text-gray-400">
            Redirecting to login...
          </div>
        );
      }

      if (allowedRoles && !allowedRoles.includes(user.role)) {
        return (
          <div className="max-w-lg mx-auto mt-20 bg-white rounded-2xl shadow-lg p-8 text-center">
            <div className="text-5xl mb-4">🚫</div>
            <h2 className="text-xl font-bold text-red-600 mb-2">Access Denied</h2>
            <p className="text-gray-500 mb-6">
              You don't have permission to access this page.<br/>
              Your role: <span className="font-semibold text-brand-500 capitalize">{user.role}</span>
            </p>
            <button
              onClick={() => navigate(getRoleDashboard(user.role))}
              className="px-6 py-2 bg-brand-500 text-white rounded-full font-semibold hover:bg-brand-600 transition"
            >
              Go to My Dashboard
            </button>
          </div>
        );
      }

      return children;
    }

    // ─── Role → Dashboard Path ────────────────────────────────────────────────────
    function getRoleDashboard(role) {
      switch (role) {
        case 'instructor': return '/instructor-dashboard';
        case 'student':    return '/student-dashboard';
        case 'admin':      return '/admin-dashboard';
        default:           return '/login';
      }
    }

    // ─── Registration Form ────────────────────────────────────────────────────────
    function RegisterPage({ navigate }) {
      const { register } = useAuth();
      const [form, setForm] = useState({ name: '', email: '', password: '', role: 'student' });
      const [error, setError] = useState('');
      const [success, setSuccess] = useState(false);

      const handleChange = (e) => {
        setForm({ ...form, [e.target.name]: e.target.value });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');
        if (!form.name || !form.email || !form.password) {
          setError('Please fill in all fields.');
          return;
        }
        if (form.password.length < 6) {
          setError('Password must be at least 6 characters.');
          return;
        }
        const result = register(form);
        if (!result.success) {
          setError(result.error);
        } else {
          setSuccess(true);
          setTimeout(() => navigate('/login'), 1500);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center px-4 py-12">
          <div className="w-full max-w-md">
            <div className="text-center mb-8">
              <div className="text-4xl mb-2">🎵</div>
              <h1 className="text-2xl font-extrabold text-brand-600">Create Account</h1>
              <p className="text-gray-400 text-sm mt-1">Join Music Practice Journal</p>
            </div>

            <form onSubmit={handleSubmit} className="bg-white rounded-2xl shadow-lg p-8 space-y-5">
              {error && (
                <div className="bg-red-50 text-red-600 text-sm font-medium px-4 py-3 rounded-lg border border-red-200">
                  {error}
                </div>
              )}
              {success && (
                <div className="bg-green-50 text-green-600 text-sm font-medium px-4 py-3 rounded-lg border border-green-200">
                  Registration successful! Redirecting to login...
                </div>
              )}

              <div>
                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Name</label>
                <input
                  type="text" name="name" value={form.name} onChange={handleChange}
                  placeholder="e.g. Emily Smith"
                  className="w-full border-2 border-brand-200 rounded-xl px-4 py-3 text-sm focus:border-brand-500 focus:outline-none transition"
                />
              </div>

              <div>
                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Email</label>
                <input
                  type="email" name="email" value={form.email} onChange={handleChange}
                  placeholder="you@example.com"
                  className="w-full border-2 border-brand-200 rounded-xl px-4 py-3 text-sm focus:border-brand-500 focus:outline-none transition"
                />
              </div>

              <div>
                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Password</label>
                <input
                  type="password" name="password" value={form.password} onChange={handleChange}
                  placeholder="Minimum 6 characters"
                  className="w-full border-2 border-brand-200 rounded-xl px-4 py-3 text-sm focus:border-brand-500 focus:outline-none transition"
                />
              </div>

              <div>
                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Role</label>
                <select
                  name="role" value={form.role} onChange={handleChange}
                  className="w-full border-2 border-brand-200 rounded-xl px-4 py-3 text-sm focus:border-brand-500 focus:outline-none transition bg-white"
                >
                  <option value="student">Student</option>
                  <option value="instructor">Instructor</option>
                  <option value="admin">Admin</option>
                </select>
              </div>

              <div className="bg-brand-50 rounded-lg px-4 py-3 text-xs text-brand-500">
                Selected role: <span className="font-bold capitalize">{form.role}</span>
                {form.role === 'student' && ' — Track your practice and earn stamps & coins'}
                {form.role === 'instructor' && ' — Manage students and review journals'}
                {form.role === 'admin' && ' — Full access to all dashboards and settings'}
              </div>

              <button
                type="submit"
                className="w-full bg-brand-500 text-white py-3 rounded-xl font-bold text-sm hover:bg-brand-600 transition"
              >
                Create Account
              </button>

              <p className="text-center text-sm text-gray-400">
                Already have an account?{' '}
                <a href="#/login" className="text-brand-500 font-semibold hover:underline">Sign In</a>
              </p>
            </form>
          </div>
        </div>
      );
    }

    // ─── Login Form ───────────────────────────────────────────────────────────────
    function LoginPage({ navigate }) {
      const { login } = useAuth();
      const [form, setForm] = useState({ email: '', password: '' });
      const [error, setError] = useState('');

      const handleChange = (e) => {
        setForm({ ...form, [e.target.name]: e.target.value });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');
        if (!form.email || !form.password) {
          setError('Please fill in all fields.');
          return;
        }
        const result = login(form.email, form.password);
        if (!result.success) {
          setError(result.error);
        } else {
          navigate(getRoleDashboard(result.user.role));
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center px-4 py-12">
          <div className="w-full max-w-md">
            <div className="text-center mb-8">
              <div className="text-4xl mb-2">🎵</div>
              <h1 className="text-2xl font-extrabold text-brand-600">Welcome Back</h1>
              <p className="text-gray-400 text-sm mt-1">Sign in to Music Practice Journal</p>
            </div>

            <form onSubmit={handleSubmit} className="bg-white rounded-2xl shadow-lg p-8 space-y-5">
              {error && (
                <div className="bg-red-50 text-red-600 text-sm font-medium px-4 py-3 rounded-lg border border-red-200">
                  {error}
                </div>
              )}

              <div>
                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Email</label>
                <input
                  type="email" name="email" value={form.email} onChange={handleChange}
                  placeholder="you@example.com"
                  className="w-full border-2 border-brand-200 rounded-xl px-4 py-3 text-sm focus:border-brand-500 focus:outline-none transition"
                />
              </div>

              <div>
                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Password</label>
                <input
                  type="password" name="password" value={form.password} onChange={handleChange}
                  placeholder="Enter your password"
                  className="w-full border-2 border-brand-200 rounded-xl px-4 py-3 text-sm focus:border-brand-500 focus:outline-none transition"
                />
              </div>

              <button
                type="submit"
                className="w-full bg-brand-500 text-white py-3 rounded-xl font-bold text-sm hover:bg-brand-600 transition"
              >
                Sign In
              </button>

              <p className="text-center text-sm text-gray-400">
                Don't have an account?{' '}
                <a href="#/register" className="text-brand-500 font-semibold hover:underline">Create Account</a>
              </p>
            </form>
          </div>
        </div>
      );
    }

    // ─── Dashboard Components ─────────────────────────────────────────────────────
    function DashboardLayout({ title, icon, color, children, navigate }) {
      const { user, logout } = useAuth();

      const handleLogout = () => {
        logout();
        navigate('/login');
      };

      return (
        <div className="min-h-screen">
          <nav className={`${color} text-white px-6 py-4 flex items-center justify-between flex-wrap gap-3`}>
            <div className="flex items-center gap-3">
              <span className="text-2xl">{icon}</span>
              <div>
                <h1 className="font-bold text-lg">{title}</h1>
                <p className="text-xs opacity-80">Welcome, {user?.name}</p>
              </div>
            </div>
            <div className="flex items-center gap-3">
              <span className="text-xs bg-white/20 px-3 py-1 rounded-full capitalize font-semibold">
                {user?.role}
              </span>
              <button
                onClick={handleLogout}
                className="text-xs bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full font-semibold transition"
              >
                Logout
              </button>
            </div>
          </nav>
          <div className="max-w-5xl mx-auto px-4 py-8">
            {children}
          </div>
        </div>
      );
    }

    function StudentDashboard({ navigate }) {
      const { user, getBalance } = useAuth();
      const allUsers = JSON.parse(localStorage.getItem('mj_auth_users') || '[]');
      const myProfile = allUsers.find(u => u.email === user.email) || {};
      const history = JSON.parse(localStorage.getItem('musicJournalHistory') || '[]');

      // Privacy: Only show this student's own practice logs
      const myEntries = history.filter(e =>
        (e.studentName && e.studentName.toLowerCase() === user.name.toLowerCase()) ||
        (e.studentEmail && e.studentEmail.toLowerCase() === user.email.toLowerCase())
      );

      // Calculate student-specific stats
      const now = new Date();
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const weekStart = new Date(now);
      weekStart.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
      weekStart.setHours(0, 0, 0, 0);

      const thisWeekEntries = myEntries.filter(e => new Date(e.date || e.weekOf) >= weekStart);
      const practiceDays = thisWeekEntries.length;

      // Read-only balance from centralized store (student cannot modify)
      const balance = getBalance(user.email);

      // Get assignments
      const assignments = JSON.parse(localStorage.getItem('mj_assignments') || '[]');
      const myAssignedTeacher = myProfile.instructorId;
      const teacherProfile = myAssignedTeacher ? allUsers.find(u => u.email === myAssignedTeacher) : null;

      return (
        <DashboardLayout title="Student Dashboard" icon="🎵" color="bg-emerald-600" navigate={navigate}>
          {/* Assigned Teacher Info */}
          <div className="mb-6 bg-white rounded-2xl shadow-md p-5 flex items-center gap-4">
            <span className="text-3xl">👩‍🏫</span>
            <div>
              <p className="text-xs font-bold text-gray-400 uppercase tracking-wide">My Teacher</p>
              {teacherProfile ? (
                <p className="font-bold text-brand-600">{teacherProfile.name} <span className="text-xs text-gray-400 font-normal">({teacherProfile.email})</span></p>
              ) : (
                <p className="text-sm text-gray-400 italic">No teacher assigned yet</p>
              )}
            </div>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            <DashCard icon="📝" title="This Week's Journal" desc={`${practiceDays} practice ${practiceDays === 1 ? 'entry' : 'entries'} this week`} />
            <DashCard icon="📅" title="Practice Streak" desc={`${practiceDays} ${practiceDays === 1 ? 'day' : 'days'} this week — ${practiceDays >= 5 ? 'keep it up!' : 'keep practicing!'}`} accent="text-emerald-600" />
            <DashCard icon="⭐" title="Stamps Balance" desc={`${balance.stamps} stamps (read-only)`} />
            <DashCard icon="🪙" title="Coins Balance" desc={`${balance.coins} coins (read-only)`} />
            <DashCard icon="🏆" title="Top Performers" desc="See who practiced the most this month" />
            <DashCard icon="📈" title="My Progress" desc={`${myEntries.length} total practice entries`} />
          </div>

          {assignments.length > 0 && (
            <div className="mt-8 bg-white rounded-2xl shadow-md overflow-hidden">
              <div className="px-6 py-4 border-b border-gray-100">
                <h3 className="font-bold text-brand-600">My Assignments</h3>
              </div>
              <div className="divide-y divide-gray-50">
                {assignments.map((a, i) => (
                  <div key={i} className="px-6 py-4 flex items-start gap-3">
                    <span className="text-2xl">📋</span>
                    <div>
                      <p className="font-semibold text-brand-600">{a.title}</p>
                      <p className="text-sm text-gray-500">{a.description}</p>
                      <p className="text-xs text-gray-400 mt-1">Posted by {a.postedBy} on {new Date(a.date).toLocaleDateString()}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="mt-8 bg-white rounded-2xl shadow-md p-6">
            <h3 className="font-bold text-brand-600 mb-3">Open Music Practice Journal</h3>
            <p className="text-sm text-gray-500 mb-3">To open your Music Practice Journal, click the button below or copy the file path into your browser:</p>
            <div className="bg-gray-50 rounded-lg px-4 py-2 mb-4 overflow-x-auto">
              <code className="text-xs text-brand-500 select-all break-all">file:///Users/lilliany/Desktop/music%20practice%20journal%20app/index.html</code>
            </div>
            <div className="flex flex-wrap gap-3">
              <a href="index.html" className="px-5 py-2.5 bg-brand-500 text-white rounded-xl text-sm font-bold hover:bg-brand-600 transition shadow">
                Open Practice Journal
              </a>
            </div>
          </div>
        </DashboardLayout>
      );
    }

    function PostAssignmentButton({ userName }) {
      const [showModal, setShowModal] = React.useState(false);
      const [title, setTitle] = React.useState('');
      const [description, setDescription] = React.useState('');
      const [success, setSuccess] = React.useState(false);

      function handlePost(e) {
        e.preventDefault();
        const assignments = JSON.parse(localStorage.getItem('mj_assignments') || '[]');
        assignments.push({
          title,
          description,
          postedBy: userName,
          date: new Date().toISOString()
        });
        localStorage.setItem('mj_assignments', JSON.stringify(assignments));
        setTitle('');
        setDescription('');
        setSuccess(true);
        setTimeout(() => { setSuccess(false); setShowModal(false); }, 1500);
      }

      return (
        <React.Fragment>
          <button
            onClick={() => setShowModal(true)}
            className="px-5 py-2.5 bg-brand-500 text-white rounded-xl font-bold shadow hover:bg-brand-600 transition flex items-center gap-2"
          >
            📋 Post Assignment
          </button>

          {showModal && (
            <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
                <h3 className="text-lg font-bold text-brand-600 mb-4">Post New Assignment</h3>
                {success ? (
                  <div className="text-center py-8">
                    <span className="text-4xl">✅</span>
                    <p className="mt-2 font-semibold text-emerald-600">Assignment posted!</p>
                  </div>
                ) : (
                  <form onSubmit={handlePost}>
                    <label className="block text-sm font-semibold text-gray-600 mb-1">Title</label>
                    <input value={title} onChange={e => setTitle(e.target.value)} required
                      className="w-full px-4 py-2 border border-gray-200 rounded-xl mb-3 focus:ring-2 focus:ring-brand-300 outline-none" placeholder="e.g. Practice Scales Week 12" />
                    <label className="block text-sm font-semibold text-gray-600 mb-1">Description</label>
                    <textarea value={description} onChange={e => setDescription(e.target.value)} required rows="3"

    // ─── Balance Update Modal (used by Instructor & Admin) ─────────────────────
    function BalanceUpdateModal({ studentEmail, studentName, currentUser, onClose, onSuccess }) {
      const { updateBalance } = useAuth();
      const [type, setType] = useState('stamps');
      const [amount, setAmount] = useState('');
      const [action, setAction] = useState('add');
      const [error, setError] = useState('');
      const [success, setSuccess] = useState(false);

      function handleSubmit(e) {
        e.preventDefault();
        setError('');
        const num = parseInt(amount);
        if (!num || num <= 0) { setError('Enter a positive number.'); return; }
        const finalAmount = action === 'add' ? num : -num;
        const result = updateBalance(currentUser, studentEmail, type, finalAmount);
        if (!result.success) { setError(result.error); }
        else { setSuccess(true); setTimeout(() => { onSuccess(); onClose(); }, 1200); }
      }

      return (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
            <h3 className="text-lg font-bold text-brand-600 mb-1">Update Balance</h3>
            <p className="text-sm text-gray-400 mb-4">{studentName} ({studentEmail})</p>
            {success ? (
              <div className="text-center py-8">
                <span className="text-4xl">✅</span>
                <p className="mt-2 font-semibold text-emerald-600">Balance updated!</p>
              </div>
            ) : (
              <form onSubmit={handleSubmit}>
                {error && <div className="bg-red-50 text-red-600 text-xs font-medium px-3 py-2 rounded-lg border border-red-200 mb-3">{error}</div>}
                <div className="flex gap-2 mb-3">
                  <button type="button" onClick={() => setType('stamps')}
                    className={`flex-1 py-2 rounded-xl text-sm font-bold transition ${type === 'stamps' ? 'bg-amber-100 text-amber-600 ring-2 ring-amber-300' : 'bg-gray-100 text-gray-500'}`}>
                    Stamps
                  </button>
                  <button type="button" onClick={() => setType('coins')}
                    className={`flex-1 py-2 rounded-xl text-sm font-bold transition ${type === 'coins' ? 'bg-yellow-100 text-yellow-600 ring-2 ring-yellow-300' : 'bg-gray-100 text-gray-500'}`}>
                    Coins
                  </button>
                </div>
                <div className="flex gap-2 mb-3">
                  <button type="button" onClick={() => setAction('add')}
                    className={`flex-1 py-2 rounded-xl text-sm font-bold transition ${action === 'add' ? 'bg-emerald-100 text-emerald-600 ring-2 ring-emerald-300' : 'bg-gray-100 text-gray-500'}`}>
                    + Add
                  </button>
                  <button type="button" onClick={() => setAction('subtract')}
                    className={`flex-1 py-2 rounded-xl text-sm font-bold transition ${action === 'subtract' ? 'bg-red-100 text-red-600 ring-2 ring-red-300' : 'bg-gray-100 text-gray-500'}`}>
                    - Subtract
                  </button>
                </div>
                <input type="number" min="1" value={amount} onChange={e => setAmount(e.target.value)} required placeholder="Amount"
                  className="w-full px-4 py-2 border border-gray-200 rounded-xl mb-4 focus:ring-2 focus:ring-brand-300 outline-none" />
                <div className="flex gap-3">
                  <button type="submit" className="flex-1 py-2.5 bg-brand-500 text-white rounded-xl font-bold hover:bg-brand-600 transition">Confirm</button>
                  <button type="button" onClick={onClose} className="flex-1 py-2.5 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition">Cancel</button>
                </div>
              </form>
            )}
          </div>
        </div>
      );
    }

    // ─── App Router ───────────────────────────────────────────────────────────────
    function App() {
      const { path, navigate } = useRouter();
      const { user } = useAuth();

      // Auto-redirect logged-in users away from auth pages
      useEffect(() => {
        if (user && (path === '/' || path === '/login' || path === '/register')) {
          navigate(getRoleDashboard(user.role));
        }
      }, [user, path]);

      switch (path) {
        case '/':
        case '/login':
          return <LoginPage navigate={navigate} />;
        case '/register':
          return <RegisterPage navigate={navigate} />;
        case '/student-dashboard':
          return (
            <ProtectedRoute allowedRoles={['student']} navigate={navigate}>
              <StudentDashboard navigate={navigate} />
            </ProtectedRoute>
          );
        case '/instructor-dashboard':
          return (
            <ProtectedRoute allowedRoles={['instructor']} navigate={navigate}>
              <InstructorDashboard navigate={navigate} />
            </ProtectedRoute>
          );
        case '/admin-dashboard':
          return (
            <ProtectedRoute allowedRoles={['admin']} navigate={navigate}>
              <AdminDashboard navigate={navigate} />
            </ProtectedRoute>
          );
        default:
          return (
            <div className="min-h-screen flex items-center justify-center">
              <div className="text-center">
                <div className="text-5xl mb-4">404</div>
                <p className="text-gray-400 mb-4">Page not found</p>
                <a href="#/login" className="text-brand-500 font-semibold hover:underline">Go to Login</a>
              </div>
            </div>
          );
      }
    }

    // ─── Mount ────────────────────────────────────────────────────────────────────
    function Root() {
      return (
        <AuthProvider>
          <App />
        </AuthProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
